spring.application.name=bibliotecaduoc

# Conexion a MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotecaduoc?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA — Flyway gestiona el esquema, Hibernate NO debe modificarlo
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway — migración versionada de la base de datos
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
